<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page déplacée</title>
    <style>
        /* Palette Adwaita Sombre (Dark) & Accent Purple */
        :root {
            --window-bg-color: #242424;
            --view-bg-color: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary-color: #9a9996;
            
            /* GNOME Purple Palette */
            --accent-purple: #7852ee;
            --accent-purple-hover: #916ff4;
            --accent-purple-active: #613cbc;
            
            --button-bg: #303030;
            --button-hover-bg: #383838;
            --button-active-bg: #282828;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--window-bg-color);
            color: var(--text-color);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Conteneur de style "Card" ou vue GNOME */
        .status-page {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 40px 24px;
            background-color: var(--view-bg-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 32px;
            letter-spacing: -0.2px;
        }

        /* Bouton principal avec l'accent Purple d'Adwaita */
        .btn-accent {
            display: inline-block;
            background-color: var(--accent-purple);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 150ms ease;
            border: 1px solid rgba(0, 0, 0, 0.2);
            margin-bottom: 24px;
        }

        .btn-accent:hover {
            background-color: var(--accent-purple-hover);
        }

        .btn-accent:active {
            background-color: var(--accent-purple-active);
        }

        /* Section lien brut en dessous */
        .link-container {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .destination-link {
            font-size: 13px;
            color: var(--text-secondary-color);
            text-decoration: none;
            word-break: break-all;
            font-family: monospace;
            transition: color 150ms ease;
        }

        .destination-link:hover {
            color: var(--accent-purple-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="status-page">
        <h1>Oups, cette page à été déplacée</h1>
        
        <a id="redirect-btn" href="#" class="btn-accent">Aller à la nouvelle adresse</a>
        
        <div class="link-container">
            <a id="redirect-text-link" href="#" class="destination-link"></a>
        </div>
    </div>

    <script>
        // CONFIGURATION DE L'URL
        const CONFIG_REDIRECT_URL = "https://ichiro47155.github.io/Brevet-Reviser/index.html";

        // Injection de la variable dans le DOM
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.getElementById("redirect-btn");
            const textLink = document.getElementById("redirect-text-link");

            if (button && textLink) {
                button.href = CONFIG_REDIRECT_URL;
                textLink.href = CONFIG_REDIRECT_URL;
                textLink.textContent = CONFIG_REDIRECT_URL;
            }
        });
    </script>
</body>
</html>
